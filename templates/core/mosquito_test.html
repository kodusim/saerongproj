    .nav-tabs {

        margin-bottom: 40px;
        animation: fadeInUp 0.6s ease 0.1s both;

    .nav-tab {

        font-weight: 600;

        color: rgba(255, 255, 255, 0.7);

    .nav-tab:hover {

        animation: fadeInUp 0.8s ease 0.2s both;

        background: white;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        text-align: center;

    .summary-card .card-icon {

    }

    .summary-card .card-label {

        color: #718096;
        margin-bottom: 8px;

    }

    .summary-card .card-value {
        font-size: 2rem;
        font-weight: 700;
        color: #2d3748;
    }

    .summary-card .card-sub {
        font-size: 0.85rem;
        margin-top: 6px;
        font-weight: 600;
    }

    .card-sub.up { color: #e53e3e; }
    .card-sub.down { color: #38a169; }

        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-bottom: 30px;
        animation: fadeInUp 0.8s ease 0.3s both;

        background: white;
        border-radius: 16px;
        padding: 28px;

    }

    }

    .station-card .station-header {

        align-items: center;
        margin-bottom: 16px;
    }

    .station-card .station-name {
        font-size: 1.15rem;
        font-weight: 700;
        color: #2d3748;
    }

    .risk-badge {

        font-weight: 700;
        color: white;

        font-weight: 600;
        color: #4a5568;

    .trend-down { color: #38a169; }

        color: #2d3748;
        margin-bottom: 20px;

    .chart-wrapper {

    .risk-legend-card {

// ============================================================
// Data Processing
// ============================================================
const stations = ["오송호수공원", "송절방죽", "가경천변"];

// Group data by station and sort by date
function getStationData(stationName) {
    return rawData
        .filter(d => d[1] === stationName)
        .sort((a, b) => a[0].localeCompare(b[0]));
}

// Get all unique dates sorted
const allDates = [...new Set(rawData.map(d => d[0]))].sort();
const last30Dates = allDates.slice(-30);
const lastDate = allDates[allDates.length - 1];
const prevDate = allDates[allDates.length - 2];

// Build lookup: date+station -> row
const lookup = {};
rawData.forEach(d => {
    lookup[d[0] + '|' + d[1]] = d;
});

// Station averages (full period)
function stationAvg(station) {
    const vals = getStationData(station).map(d => d[2]);
    return vals.reduce((s, v) => s + v, 0) / vals.length;
}

// Station 7-day average
function station7dAvg(station) {
    const data = getStationData(station);
    const last7 = data.slice(-7);
    return last7.reduce((s, d) => s + d[2], 0) / last7.length;
}

// Latest value for station
function latestVal(station) {
    const row = lookup[lastDate + '|' + station];
    return row ? row[2] : 0;
}
function prevVal(station) {
    const row = lookup[prevDate + '|' + station];
    return row ? row[2] : 0;
}

// Risk level
function riskLevel(count) {
    if (count <= 10) return { name: '안전', cls: 'risk-safe', color: '#38a169' };
    if (count <= 50) return { name: '관심', cls: 'risk-interest', color: '#d69e2e' };
    if (count <= 100) return { name: '주의', cls: 'risk-caution', color: '#dd6b20' };
    if (count <= 200) return { name: '경고', cls: 'risk-warning', color: '#e53e3e' };
    return { name: '위험', cls: 'risk-danger', color: '#805ad5' };
}

// Today's average across all stations
const todayAvg = Math.round(stations.reduce((s, st) => s + latestVal(st), 0) / stations.length);
const prevAvgVal = Math.round(stations.reduce((s, st) => s + prevVal(st), 0) / stations.length);
const changePct = prevAvgVal > 0 ? Math.round((todayAvg - prevAvgVal) / prevAvgVal * 100) : 0;
const overallRisk = riskLevel(todayAvg);

// ============================================================
// 1. Summary Cards
// ============================================================
const summaryHTML = `
    <div class="summary-card">
        <div class="card-icon">&#x1F99F;</div>
        <div class="card-label">최종일 평균 포집량</div>
        <div class="card-value">${todayAvg}</div>
        <div class="card-sub" style="color:#718096;">${lastDate}</div>
    </div>
    <div class="summary-card">
        <div class="card-icon">${changePct >= 0 ? '&#x1F4C8;' : '&#x1F4C9;'}</div>
        <div class="card-label">전일 대비 변화</div>
        <div class="card-value">${changePct >= 0 ? '+' : ''}${changePct}%</div>
        <div class="card-sub ${changePct >= 0 ? 'up' : 'down'}">${changePct >= 0 ? '증가 추세' : '감소 추세'}</div>
    </div>
    <div class="summary-card">
        <div class="card-icon">&#x26A0;&#xFE0F;</div>
        <div class="card-label">위험 등급</div>
        <div class="card-value"><span class="risk-badge ${overallRisk.cls}">${overallRisk.name}</span></div>
        <div class="card-sub" style="color:#718096;">5단계 평가 기준</div>
    </div>
    <div class="summary-card">
        <div class="card-icon">&#x1F4CD;</div>
        <div class="card-label">활성 관측소</div>
        <div class="card-value">3<span style="font-size:1rem;color:#718096;">개소</span></div>
        <div class="card-sub" style="color:#718096;">청주시 흥덕구</div>
    </div>
`;
document.getElementById('summaryCards').innerHTML = summaryHTML;

// 2. Station Cards
// ============================================================
let stationHTML = '';
stations.forEach(st => {
    const latest = latestVal(st);
    const prev = prevVal(st);
    const avg7 = station7dAvg(st);
    const risk = riskLevel(latest);
    const trendUp = latest >= prev;
    const trendPct = prev > 0 ? Math.round((latest - prev) / prev * 100) : 0;

    stationHTML += `
        <div class="station-card">
            <div class="station-header">
                <span class="station-name">${st}</span>
                <span class="risk-badge ${risk.cls}">${risk.name}</span>
            </div>
            <div class="station-value">${latest}</div>
            <div class="station-unit">마리 (${lastDate})</div>
            <div class="station-meta">
                <div>
                    <div class="meta-label">전일 대비</div>
                    <div class="meta-value ${trendUp ? 'trend-up' : 'trend-down'}">
                        ${trendUp ? '&#x25B2;' : '&#x25BC;'} ${trendPct >= 0 ? '+' : ''}${trendPct}%
                    </div>
                </div>
                <div>
                    <div class="meta-label">7일 평균</div>
                    <div class="meta-value">${avg7.toFixed(1)}</div>
                </div>
                <div>
                    <div class="meta-label">전체 평균</div>
                    <div class="meta-value">${stationAvg(st).toFixed(1)}</div>
                </div>
            </div>
        </div>
    `;
});
document.getElementById('stationCards').innerHTML = stationHTML;

const stationColors = {
    '오송호수공원': { line: '#667eea', bg: 'rgba(102,126,234,0.1)', bar: 'rgba(102,126,234,0.8)' },

// Line chart - last 30 days
const lineLabels = last30Dates.map(d => d.slice(5)); // MM-DD
const lineDatasets = stations.map(st => {
    const data = last30Dates.map(date => {
        const row = lookup[date + '|' + st];
        return row ? row[2] : null;
    });

        label: st,
        data: data,
        borderColor: stationColors[st].line,
        backgroundColor: stationColors[st].bg,
        borderWidth: 2,
        pointRadius: 2,
        pointHoverRadius: 5,
        tension: 0.3,
        fill: false
    };
});

new Chart(document.getElementById('lineChart'), {
    type: 'line',
    data: { labels: lineLabels, datasets: lineDatasets },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: { position: 'top', labels: { usePointStyle: true, padding: 16 } },
            tooltip: { mode: 'index', intersect: false }
        },
        scales: {

            },

// 6. AI Prediction Section
// ============================================================
// Simple prediction based on 7-day moving average and trend
function predictNext3(station) {
    const data = getStationData(station);
    const last7 = data.slice(-7).map(d => d[2]);
    const avg = last7.reduce((s, v) => s + v, 0) / 7;
    const last3 = last7.slice(-3);
    const trend = (last3[2] - last3[0]) / 2;
    return [
        Math.max(0, Math.round(avg + trend * 0.5)),
        Math.max(0, Math.round(avg + trend * 1.0)),
        Math.max(0, Math.round(avg + trend * 1.5))
    ];
}

const predictions = {};
let maxPred = 0;
stations.forEach(st => {
    predictions[st] = predictNext3(st);
    maxPred = Math.max(maxPred, ...predictions[st]);
});

const overallPredRisk = riskLevel(maxPred);
const needsAction = maxPred > 100;

// Create date labels for next 3 days after lastDate
function addDays(dateStr, n) {
    const d = new Date(dateStr);
    d.setDate(d.getDate() + n);
    return d.toISOString().slice(0, 10);
}
const predDates = [addDays(lastDate, 1), addDays(lastDate, 2), addDays(lastDate, 3)];

let predHTML = `<div class="prediction-card"><h3>관측소별 3일 예측</h3>`;
stations.forEach(st => {
    const preds = predictions[st];
    const trendDir = preds[2] > preds[0] ? '&#x25B2; 증가' : (preds[2] < preds[0] ? '&#x25BC; 감소' : '&#x25CF; 유지');
    const trendCls = preds[2] > preds[0] ? 'trend-up' : 'trend-down';
    predHTML += `
        <div style="margin-bottom: 18px;">
            <div style="font-weight:700; color:#2d3748; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
                <span>${st}</span>
                <span class="${trendCls}" style="font-size:0.85rem;">${trendDir}</span>
            </div>
            ${preds.map((p, i) => {
                const r = riskLevel(p);
                return `<div class="pred-day">
                    <span class="pred-label">${predDates[i]}</span>
                    <span class="pred-val" style="color:${r.color};">${p} <span style="font-size:0.8rem;font-weight:400;">마리</span></span>
                </div>`;
            }).join('')}
        </div>
    `;
});
predHTML += '</div>';

predHTML += `
    <div class="recommendation-card">
        <h3>방역 추천 사항</h3>
        <div style="text-align:center; margin-bottom:20px;">
            <div style="font-size:0.85rem; color:#718096; margin-bottom:6px;">예측 최대 위험 등급</div>
            <span class="risk-badge ${overallPredRisk.cls}" style="font-size:1.1rem; padding: 8px 20px;">${overallPredRisk.name}</span>
        </div>
        <div class="rec-item">
            <span class="rec-icon">${needsAction ? '&#x1F6A8;' : '&#x2705;'}</span>
            <span>${needsAction
                ? '<strong>방역 필요:</strong> 송절방죽 인근 집중 방역을 권장합니다. 해당 관측소에서 지속적으로 높은 포집량이 관측되고 있습니다.'
                : '<strong>현재 안정:</strong> 전반적으로 포집량이 감소 추세에 있어 정기 방역으로 충분합니다.'}</span>
        </div>
        <div class="rec-item">
            <span class="rec-icon">&#x1F4CB;</span>
            <span><strong>행동 지침:</strong> ${maxPred > 50
                ? '야외 활동 시 긴 소매 착용 및 모기 기피제 사용을 권장합니다. 물웅덩이 제거와 하수구 정비를 병행하세요.'
                : '기본적인 방충 대책을 유지하고, 주간 모니터링을 지속하세요.'}</span>
        </div>
        <div class="rec-item">
            <span class="rec-icon">&#x1F4C5;</span>
            <span><strong>모니터링:</strong> 데이터 수집 기간은 2025년 7월 1일 ~ 8월 31일입니다. ${allDates.length}일간 총 ${rawData.length}건의 측정 데이터가 분석에 활용되었습니다.</span>
        </div>
    </div>
`;
document.getElementById('predictionSection').innerHTML = predHTML;
