<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 - AI 모기 예측 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #1B3A6B;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.login-box {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.25);
    width: 100%;
    max-width: 400px;
    overflow: hidden;
}
.login-header {
    background: #1B3A6B;
    padding: 32px 32px 28px;
    text-align: center;
    color: #fff;
}
.login-header .logo-icon {
    width: 56px;
    height: 56px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    margin-bottom: 14px;
}
.login-header h1 {
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 4px;
}
.login-header p {
    font-size: 0.82rem;
    color: rgba(255,255,255,0.6);
}
.login-body {
    padding: 32px;
}
.form-group {
    margin-bottom: 18px;
}
.form-group label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: #333;
    margin-bottom: 6px;
}
.form-group input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: 'Noto Sans KR', sans-serif;
    transition: border-color 0.2s;
    outline: none;
}
.form-group input:focus {
    border-color: #1B3A6B;
    box-shadow: 0 0 0 3px rgba(27,58,107,0.1);
}
.error-msg {
    background: #FDECEA;
    color: #B71C1C;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.85rem;
    margin-bottom: 18px;
    text-align: center;
}
.login-btn {
    width: 100%;
    padding: 14px;
    background: #1B3A6B;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background 0.2s;
}
.login-btn:hover {
    background: #2a5298;
}
.login-footer {
    text-align: center;
    padding: 0 32px 24px;
    font-size: 0.78rem;
    color: #aaa;
}
</style>
</head>
<body>
<div class="login-box">
    <div class="login-header">
        <div class="logo-icon">&#x1F99F;</div>
        <h1>AI 모기 예측 시스템</h1>
        <p>MOSCOM Monitoring Dashboard</p>
    </div>
    <form method="post" class="login-body">
        {% csrf_token %}
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
        <div class="form-group">
            <label for="username">아이디</label>
            <input type="text" id="username" name="username" placeholder="아이디를 입력하세요" autocomplete="username" required>
        </div>
        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password" required>
        </div>
        <button type="submit" class="login-btn">로그인</button>
    </form>
    <div class="login-footer">
        &copy; 2026 MOSCOM &middot; 인가된 사용자만 접근 가능합니다
    </div>
</div>
</body>
</html>
