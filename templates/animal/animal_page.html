<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로드나인 동물의왕국 길드 운영</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-0: #0a0c1c;
  --bg-1: #131730;
  --bg-2: #1a1f3a;
  --line: rgba(120,140,200,.16);
  --text: #e6e8f0;
  --text-dim: rgba(230,232,240,.6);
  --text-mute: rgba(230,232,240,.38);
  --accent: #7a8fff;
  --accent-2: #b56cff;
  --green: #4ade80;
  --red: #ff7b7b;
  --orange: #ffb86b;
  --mono: 'JetBrains Mono', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background:
    radial-gradient(circle at 80% -10%, rgba(140,80,220,.15) 0%, transparent 40%),
    radial-gradient(circle at 0% 80%, rgba(80,120,220,.14) 0%, transparent 40%),
    var(--bg-0);
  color: var(--text);
  min-height: 100vh;
  font-size: 21px; line-height: 1.5;
}
.wrap { max-width: 900px; margin: 0 auto; min-height: 100vh; padding-bottom: 40px; }

/* ── 헤더 ── */
header {
  position: sticky; top: 0; z-index: 50;
  background: linear-gradient(180deg, rgba(10,12,28,.95), rgba(10,12,28,.85));
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
  padding: 14px 18px;
  display: flex; align-items: center; justify-content: space-between;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-logo {
  width: 34px; height: 34px; border-radius: 9px;
  background: linear-gradient(135deg, #5b6cff, #b56cff);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; box-shadow: 0 4px 12px rgba(91,108,255,.35);
}
.brand-name { font-weight: 700; font-size: 22px; letter-spacing: -.3px; }
.brand-sub  { font-size: 15px; color: var(--text-mute); letter-spacing: .04em; }

.head-btn {
  padding: 7px 13px; font-size: 18px; font-weight: 600;
  background: rgba(255,255,255,.06);
  border: 1px solid var(--line);
  border-radius: 8px; color: var(--text); cursor: pointer;
  text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
  transition: all .15s;
}
.head-btn:hover { background: rgba(255,255,255,.12); border-color: rgba(120,140,200,.3); }
.head-btn.admin {
  background: linear-gradient(135deg, rgba(91,108,255,.25), rgba(181,108,255,.25));
  border-color: rgba(122,143,255,.4);
}
.head-btn .dot {
  width: 6px; height: 6px; border-radius: 50%; background: #4ade80;
  box-shadow: 0 0 6px rgba(74,222,128,.6);
}

/* ── 탭 ── */
.tabs {
  display: flex; gap: 2px; padding: 12px 14px 0;
  border-bottom: 1px solid var(--line);
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.tab {
  padding: 10px 14px; font-size: 20px; font-weight: 600;
  color: var(--text-mute); background: none; border: none;
  border-bottom: 2px solid transparent; cursor: pointer;
  white-space: nowrap; font-family: inherit;
  transition: color .15s, border-color .15s;
  margin-bottom: -1px;
}
.tab:hover { color: var(--text-dim); }
.tab.active {
  color: var(--text);
  border-bottom-color: var(--accent);
}

.panel { display: none; padding: 18px 14px 0; }
.panel.active { display: block; }

/* ── 페이지 헤더 ── */
.ph {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.ph-title {
  font-size: 24px; font-weight: 700;
  display: flex; align-items: center; gap: 8px;
}
.ph-count {
  font-size: 18px; color: var(--text-mute); font-family: var(--mono);
  background: rgba(255,255,255,.05); padding: 3px 8px; border-radius: 10px;
}
.ph-add {
  padding: 7px 12px; font-size: 18px; font-weight: 600;
  background: linear-gradient(135deg, #5b6cff, #8b5cff);
  border: none; border-radius: 7px; color: #fff; cursor: pointer;
  font-family: inherit; transition: transform .1s, box-shadow .15s;
  display: inline-flex; align-items: center; gap: 5px;
}
.ph-add:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(91,108,255,.35); }
.ph-add:disabled { opacity: .4; cursor: not-allowed; }

/* ── 길드원 표 ── */
.member-list {
  background: rgba(255,255,255,.025);
  border: 1px solid var(--line);
  border-radius: 12px; overflow: hidden;
}
.member-row {
  display: grid;
  grid-template-columns: 38px 1fr 90px 90px;
  gap: 8px; align-items: center;
  padding: 11px 12px;
  border-bottom: 1px solid var(--line);
  font-size: 20px;
}
.member-row:last-child { border-bottom: none; }
.member-row.head {
  background: rgba(255,255,255,.04);
  font-size: 16px; color: var(--text-mute);
  font-weight: 700; letter-spacing: .04em;
  padding: 9px 12px;
}

.cell-no { font-family: var(--mono); color: var(--text-mute); text-align: center; }
.cell-nick { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cell-power { font-family: var(--mono); text-align: right; color: var(--text); }
.cell-weapon { font-family: var(--mono); text-align: right; color: var(--text-dim); font-size: 18px; }

/* admin 모드: 행 클릭 → 액션 패널 펼치기 */
.member-row.editable { cursor: pointer; }
.member-row.editable:hover { background: rgba(255,255,255,.03); }
.member-row.expanded {
  background: rgba(91,108,255,.08);
  border-bottom: 1px solid rgba(122,143,255,.2);
}
.member-edit {
  grid-column: 1 / -1;
  padding: 10px 0 4px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.member-edit input {
  background: rgba(0,0,0,.25);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 7px 10px; color: var(--text); font-size: 18px;
  font-family: inherit; outline: none;
}
.member-edit input:focus { border-color: var(--accent); }
.member-edit .label {
  font-size: 15px; color: var(--text-mute); margin-bottom: 3px;
  font-weight: 600; letter-spacing: .04em;
}
.member-edit-actions {
  grid-column: 1 / -1;
  display: flex; gap: 6px; justify-content: flex-end; margin-top: 6px;
}
.btn-sm {
  padding: 6px 12px; font-size: 16px; font-weight: 600;
  border-radius: 6px; cursor: pointer; font-family: inherit;
  border: 1px solid var(--line); background: rgba(255,255,255,.05);
  color: var(--text); transition: all .12s;
}
.btn-sm:hover { background: rgba(255,255,255,.1); }
.btn-sm.primary {
  background: linear-gradient(135deg, #5b6cff, #8b5cff);
  border-color: transparent;
}
.btn-sm.primary:hover { box-shadow: 0 4px 12px rgba(91,108,255,.35); }
.btn-sm.danger { color: #ff9b9b; border-color: rgba(255,123,123,.3); }
.btn-sm.danger:hover { background: rgba(255,123,123,.1); }

.empty {
  padding: 36px; text-align: center; color: var(--text-mute);
  font-size: 20px;
}

/* 추가 폼 (어드민) */
.add-form {
  background: rgba(91,108,255,.06);
  border: 1px solid rgba(122,143,255,.25);
  border-radius: 12px; padding: 14px;
  margin-bottom: 12px;
  display: none;
}
.add-form.open { display: block; }
.add-form-head {
  font-size: 18px; font-weight: 700; color: var(--accent);
  margin-bottom: 10px; letter-spacing: .04em;
}
.add-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px;
}
.add-grid input {
  background: rgba(0,0,0,.3); border: 1px solid var(--line);
  border-radius: 6px; padding: 8px 10px; color: var(--text);
  font-size: 18px; font-family: inherit; outline: none;
}
.add-grid input:focus { border-color: var(--accent); }
.add-actions { display: flex; gap: 6px; justify-content: flex-end; }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: rgba(20,25,45,.98);
  border: 1px solid var(--line);
  padding: 10px 18px; border-radius: 24px;
  font-size: 18px; color: var(--text);
  box-shadow: 0 10px 30px rgba(0,0,0,.5);
  z-index: 100; opacity: 0; pointer-events: none;
  transition: opacity .2s, transform .2s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.err { color: #ffb3b3; border-color: rgba(255,123,123,.4); }
.toast.ok  { color: #b3ffcd; border-color: rgba(74,222,128,.4); }

/* ── 컬렉용 아이템 ── */
.col-subtabs {
  display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap;
}
.col-subtab {
  padding: 7px 12px; font-size: 18px; font-weight: 600;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--line);
  border-radius: 18px; color: var(--text-dim); cursor: pointer;
  font-family: inherit; transition: all .12s; white-space: nowrap;
}
.col-subtab:hover { color: var(--text); background: rgba(255,255,255,.08); }
.col-subtab.active {
  color: #fff;
  background: linear-gradient(135deg, rgba(91,108,255,.5), rgba(181,108,255,.5));
  border-color: rgba(122,143,255,.5);
}
.col-meta {
  font-size: 16px; color: var(--text-mute); margin-bottom: 10px;
  font-family: var(--mono); display: flex; gap: 12px; flex-wrap: wrap;
}
.col-meta span b { color: var(--text-dim); }

.col-prefixes {
  display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap;
}
.col-prefix {
  padding: 4px 10px; font-size: 16px; font-weight: 600;
  background: rgba(255,255,255,.03);
  border: 1px solid var(--line);
  border-radius: 12px; color: var(--text-mute); cursor: pointer;
  font-family: inherit; transition: all .12s; white-space: nowrap;
}
.col-prefix:hover { color: var(--text-dim); background: rgba(255,255,255,.06); }
.col-prefix.active {
  color: #fff;
  background: rgba(122,143,255,.25);
  border-color: rgba(122,143,255,.55);
}
.col-prefix .cnt {
  font-family: var(--mono); font-size: 15px; opacity: .7;
  margin-left: 6px;
}

.col-table-wrap {
  background: rgba(255,255,255,.025);
  border: 1px solid var(--line);
  border-radius: 12px; overflow: auto;
  max-height: 70vh;
  -webkit-overflow-scrolling: touch;
}
.col-table {
  border-collapse: separate; border-spacing: 0;
  font-size: 18px;
}
.col-table th, .col-table td {
  border-bottom: 1px solid var(--line);
  border-right: 1px solid var(--line);
  padding: 0; vertical-align: middle;
}
.col-table th {
  background: rgba(20,25,45,.96);
  font-weight: 600;
  color: var(--text-dim);
  position: sticky; top: 0; z-index: 5;
}
.col-table th.col-name {
  /* 가로축: 아이템명 - 세로 쓰기 (한글 자연 순서: 위에서 아래로) */
  height: 195px; width: 48px; min-width: 48px;
  padding: 0;
  vertical-align: bottom;
  color: var(--text);
}
.col-table th.col-name .vtxt {
  display: inline-block;
  writing-mode: vertical-lr;
  text-orientation: mixed;
  font-size: 16px;
  white-space: nowrap;
  padding: 8px 0 6px;
  letter-spacing: .02em;
}
.col-table th.col-no, .col-table th.col-nick, .col-table th.col-power {
  font-size: 15px; padding: 8px 8px;
  letter-spacing: .04em;
  text-align: center;
  color: var(--text-mute);
}
.col-table th.col-nick { text-align: left; }
.col-table th.col-power { text-align: right; }

/* sticky left columns */
.col-table th.col-no, .col-table td.cell-no2 {
  position: sticky; left: 0; z-index: 4;
  background: rgba(20,25,45,.96);
  width: 48px; min-width: 48px;
}
.col-table th.col-nick, .col-table td.cell-nick2 {
  position: sticky; left: 48px; z-index: 4;
  background: rgba(20,25,45,.96);
  width: 120px; min-width: 120px; max-width: 120px;
}
.col-table th.col-power, .col-table td.cell-power2 {
  position: sticky; left: 168px; z-index: 4;
  background: rgba(20,25,45,.96);
  width: 90px; min-width: 90px;
}
.col-table th.col-no { z-index: 6; }
.col-table th.col-nick { z-index: 6; }
.col-table th.col-power { z-index: 6; }

.col-table td.cell-no2 {
  font-family: var(--mono); color: var(--text-mute);
  text-align: center; font-size: 15px; padding: 4px 0;
}
.col-table td.cell-nick2 {
  font-weight: 600; font-size: 16px;
  padding: 4px 8px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
}
.col-table td.cell-power2 {
  font-family: var(--mono); font-size: 15px;
  color: var(--text-dim); text-align: right; padding: 4px 8px;
}
.col-table td.cell-chk {
  width: 48px; min-width: 48px; height: 48px;
  text-align: center; padding: 0;
}
.col-chk {
  display: inline-flex; align-items: center; justify-content: center;
  width: 33px; height: 33px; border-radius: 5px;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--line);
  color: var(--text-mute); font-size: 20px;
  cursor: default; user-select: none;
  transition: all .1s;
}
.col-chk.owned {
  background: linear-gradient(135deg, rgba(74,222,128,.25), rgba(74,222,128,.12));
  border-color: rgba(74,222,128,.5);
  color: #4ade80;
}
.col-chk.admin { cursor: pointer; }
.col-chk.admin:hover { transform: scale(1.08); border-color: var(--accent); }
.col-chk.saving { opacity: .4; }

/* 행 호버 (admin 만) — sticky 셀 배경도 같이 변하도록 */
.col-table tr.row.admin:hover td {
  background: rgba(91,108,255,.06);
}
.col-table tr.row.admin:hover td.cell-no2,
.col-table tr.row.admin:hover td.cell-nick2,
.col-table tr.row.admin:hover td.cell-power2 {
  background: linear-gradient(180deg, rgba(91,108,255,.18), rgba(91,108,255,.12)), rgba(20,25,45,.96);
}

/* coming-soon panel */
.coming {
  padding: 60px 20px; text-align: center; color: var(--text-mute);
}
.coming-icon { font-size: 2rem; margin-bottom: 12px; opacity: .6; }
.coming-title { font-size: 21px; color: var(--text-dim); margin-bottom: 4px; font-weight: 600; }
.coming-sub { font-size: 18px; }
</style>
</head>
<body>
<div class="wrap">

  <!-- 헤더 -->
  <header>
    <div class="brand">
      <div class="brand-logo">🐾</div>
      <div>
        <div class="brand-name">로드나인 동물의왕국</div>
        <div class="brand-sub">Guild Operations</div>
      </div>
    </div>
    {% if is_admin %}
      <a href="/animal/logout/" class="head-btn admin"><span class="dot"></span>관리자 · 로그아웃</a>
    {% else %}
      <a href="/animal/login/" class="head-btn">관리자 로그인</a>
    {% endif %}
  </header>

  <!-- 탭 -->
  <div class="tabs">
    <button class="tab active" data-tab="members">길드원 현황</button>
    <button class="tab" data-tab="boss">보스 참여</button>
    <button class="tab" data-tab="equipment">장비 내판</button>
    <button class="tab" data-tab="collect">컬렉용 아이템</button>
    <button class="tab" data-tab="settle">정산</button>
    <button class="tab" data-tab="cash">자금 출납</button>
  </div>

  <!-- 길드원 현황 -->
  <div class="panel active" id="panel-members">
    <div class="ph">
      <div class="ph-title">👥 길드원 현황 <span class="ph-count" id="m-count">0</span></div>
      {% if is_admin %}
        <button class="ph-add" id="m-add-toggle">＋ 길드원 추가</button>
      {% endif %}
    </div>

    {% if is_admin %}
    <div class="add-form" id="m-add-form">
      <div class="add-form-head">새 길드원 추가</div>
      <div class="add-grid">
        <input id="add-nick" type="text" placeholder="닉네임">
        <input id="add-power" type="number" placeholder="전투력" min="0">
        <input id="add-weapon" type="text" placeholder="무기">
      </div>
      <div class="add-actions">
        <button class="btn-sm" onclick="addToggle()">취소</button>
        <button class="btn-sm primary" onclick="addSubmit()">추가</button>
      </div>
    </div>
    {% endif %}

    <div class="member-list" id="m-list">
      <div class="member-row head">
        <div>연번</div>
        <div>닉네임</div>
        <div style="text-align:right">전투력</div>
        <div style="text-align:right">무기</div>
      </div>
      <div class="empty">로딩 중…</div>
    </div>
  </div>

  <!-- 다른 탭들 (개발 예정) -->
  <div class="panel" id="panel-boss"><div class="coming"><div class="coming-icon">🗡️</div><div class="coming-title">보스 참여</div><div class="coming-sub">개발 예정</div></div></div>
  <div class="panel" id="panel-equipment"><div class="coming"><div class="coming-icon">⚔️</div><div class="coming-title">장비 내판</div><div class="coming-sub">개발 예정</div></div></div>
  <!-- 컬렉용 아이템 -->
  <div class="panel" id="panel-collect">
    <div class="ph">
      <div class="ph-title">💎 컬렉용 아이템</div>
    </div>
    <div class="col-subtabs" id="col-subtabs"></div>
    <div class="col-meta" id="col-meta"></div>
    <div class="col-prefixes" id="col-prefixes"></div>
    <div class="col-table-wrap" id="col-table-wrap">
      <div class="empty">로딩 중…</div>
    </div>
  </div>
  <div class="panel" id="panel-settle"><div class="coming"><div class="coming-icon">💰</div><div class="coming-title">정산</div><div class="coming-sub">개발 예정</div></div></div>
  <div class="panel" id="panel-cash"><div class="coming"><div class="coming-icon">📒</div><div class="coming-title">자금 출납</div><div class="coming-sub">개발 예정</div></div></div>

</div>

<div id="toast" class="toast"></div>

<script>
const IS_ADMIN = {% if is_admin %}true{% else %}false{% endif %};
const STATE = { members: [], expandedId: null };

function toast(msg, kind) {
  const t = document.getElementById('toast');
  t.className = 'toast show ' + (kind || '');
  t.textContent = msg;
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─ 탭 전환 ─
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

// ─ 길드원 로드 ─
async function loadMembers() {
  try {
    const res = await fetch('/animal/api/members/', { credentials: 'same-origin' });
    const j = await res.json();
    STATE.members = j.items || [];
    renderMembers();
  } catch (e) {
    document.getElementById('m-list').innerHTML = `<div class="empty" style="color:#ff9b9b">로드 실패: ${e.message}</div>`;
  }
}

function escapeHtml(s) {
  return (s == null ? '' : String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function fmtPower(n) {
  return Number(n || 0).toLocaleString();
}

function renderMembers() {
  const list = document.getElementById('m-list');
  document.getElementById('m-count').textContent = STATE.members.length + '명';
  if (STATE.members.length === 0) {
    list.innerHTML = `<div class="member-row head"><div>연번</div><div>닉네임</div><div style="text-align:right">전투력</div><div style="text-align:right">무기</div></div><div class="empty">길드원이 없습니다.</div>`;
    return;
  }
  const headHtml = `<div class="member-row head"><div>연번</div><div>닉네임</div><div style="text-align:right">전투력</div><div style="text-align:right">무기</div></div>`;
  const rowsHtml = STATE.members.map(m => {
    const expanded = STATE.expandedId === m.id;
    return `
      <div class="member-row ${IS_ADMIN ? 'editable' : ''} ${expanded ? 'expanded' : ''}" data-id="${m.id}">
        <div class="cell-no">${m.order}</div>
        <div class="cell-nick">${escapeHtml(m.nickname)}</div>
        <div class="cell-power">${fmtPower(m.power)}</div>
        <div class="cell-weapon">${escapeHtml(m.weapon || '-')}</div>
        ${expanded ? `
          <div class="member-edit">
            <div>
              <div class="label">닉네임</div>
              <input id="ed-nick-${m.id}" value="${escapeHtml(m.nickname)}">
            </div>
            <div>
              <div class="label">무기</div>
              <input id="ed-weapon-${m.id}" value="${escapeHtml(m.weapon || '')}">
            </div>
            <div style="grid-column:1/-1">
              <div class="label">전투력</div>
              <input id="ed-power-${m.id}" type="number" min="0" value="${m.power}">
            </div>
            <div class="member-edit-actions">
              <button class="btn-sm danger" onclick="removeMember(${m.id})">삭제</button>
              <button class="btn-sm" onclick="cancelEdit()">취소</button>
              <button class="btn-sm primary" onclick="saveMember(${m.id})">저장</button>
            </div>
          </div>` : ''}
      </div>
    `;
  }).join('');
  list.innerHTML = headHtml + rowsHtml;

  // 행 클릭 → 펼치기 (admin only)
  if (IS_ADMIN) {
    list.querySelectorAll('.member-row.editable').forEach(row => {
      row.addEventListener('click', (e) => {
        // 입력/버튼 클릭은 무시
        if (e.target.closest('input,button')) return;
        const id = parseInt(row.dataset.id, 10);
        STATE.expandedId = (STATE.expandedId === id) ? null : id;
        renderMembers();
      });
    });
  }
}

function cancelEdit() {
  STATE.expandedId = null;
  renderMembers();
}

async function saveMember(id) {
  const nick = document.getElementById('ed-nick-' + id).value.trim();
  const power = parseInt(document.getElementById('ed-power-' + id).value || '0', 10) || 0;
  const weapon = document.getElementById('ed-weapon-' + id).value.trim();
  if (!nick) { toast('닉네임을 입력하세요', 'err'); return; }
  try {
    const res = await fetch('/animal/api/members/' + id + '/', {
      method: 'PUT', credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nickname: nick, power, weapon }),
    });
    const j = await res.json();
    if (!res.ok) { toast(j.error || '저장 실패', 'err'); return; }
    toast('수정 완료', 'ok');
    STATE.expandedId = null;
    await loadMembers();
  } catch (e) { toast(e.message, 'err'); }
}

async function removeMember(id) {
  const m = STATE.members.find(x => x.id === id);
  if (!confirm(`"${m ? m.nickname : ''}" 길드원을 삭제하시겠습니까?`)) return;
  try {
    const res = await fetch('/animal/api/members/' + id + '/', {
      method: 'DELETE', credentials: 'same-origin',
    });
    const j = await res.json();
    if (!res.ok) { toast(j.error || '삭제 실패', 'err'); return; }
    toast('삭제 완료', 'ok');
    STATE.expandedId = null;
    await loadMembers();
  } catch (e) { toast(e.message, 'err'); }
}

function addToggle() {
  const f = document.getElementById('m-add-form');
  if (!f) return;
  f.classList.toggle('open');
  if (f.classList.contains('open')) {
    document.getElementById('add-nick').value = '';
    document.getElementById('add-power').value = '';
    document.getElementById('add-weapon').value = '';
    document.getElementById('add-nick').focus();
  }
}

async function addSubmit() {
  const nick = document.getElementById('add-nick').value.trim();
  const power = parseInt(document.getElementById('add-power').value || '0', 10) || 0;
  const weapon = document.getElementById('add-weapon').value.trim();
  if (!nick) { toast('닉네임을 입력하세요', 'err'); return; }
  try {
    const res = await fetch('/animal/api/members/create/', {
      method: 'POST', credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nickname: nick, power, weapon }),
    });
    const j = await res.json();
    if (!res.ok) { toast(j.error || '추가 실패', 'err'); return; }
    toast('추가 완료', 'ok');
    addToggle();
    await loadMembers();
  } catch (e) { toast(e.message, 'err'); }
}

if (IS_ADMIN) {
  const t = document.getElementById('m-add-toggle');
  if (t) t.addEventListener('click', addToggle);
}

loadMembers();

// ─ 컬렉용 아이템 ─
const COL = {
  category: 'accessory',
  data: null,
  prefix: null,   // 활성 prefix 필터 (null = 전체)
};

function itemPrefix(name) {
  // "계승자의 목걸이" → "계승자의", "세라드허리띠" → "세라드허리띠" (split 안 되면 원본)
  const i = name.indexOf(' ');
  return i > 0 ? name.slice(0, i) : name;
}

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.dataset.tab === 'collect' && !COL.data) {
      loadCollectibles(COL.category);
    }
  });
});

async function loadCollectibles(category) {
  COL.category = category;
  COL.prefix = null;
  const wrap = document.getElementById('col-table-wrap');
  wrap.innerHTML = '<div class="empty">로딩 중…</div>';
  document.getElementById('col-prefixes').innerHTML = '';
  try {
    const res = await fetch('/animal/api/collectibles/?category=' + encodeURIComponent(category), { credentials: 'same-origin' });
    const j = await res.json();
    if (!res.ok) { wrap.innerHTML = `<div class="empty" style="color:#ff9b9b">${j.error || '로드 실패'}</div>`; return; }
    COL.data = j;
    renderCollectiblesSubtabs();
    renderCollectiblesPrefixes();
    renderCollectiblesTable();
  } catch (e) {
    wrap.innerHTML = `<div class="empty" style="color:#ff9b9b">로드 실패: ${e.message}</div>`;
  }
}

function renderCollectiblesPrefixes() {
  const items = COL.data.items || [];
  // 등장 순서 유지하면서 prefix 카운트
  const order = [];
  const counts = new Map();
  items.forEach(it => {
    const p = itemPrefix(it.name);
    if (!counts.has(p)) order.push(p);
    counts.set(p, (counts.get(p) || 0) + 1);
  });
  const host = document.getElementById('col-prefixes');
  if (order.length <= 1) { host.innerHTML = ''; return; }
  let html = `<button class="col-prefix ${COL.prefix === null ? 'active' : ''}" data-prefix="">전체<span class="cnt">${items.length}</span></button>`;
  order.forEach(p => {
    html += `<button class="col-prefix ${COL.prefix === p ? 'active' : ''}" data-prefix="${escapeHtml(p)}">${escapeHtml(p)}<span class="cnt">${counts.get(p)}</span></button>`;
  });
  host.innerHTML = html;
  host.querySelectorAll('.col-prefix').forEach(btn => {
    btn.addEventListener('click', () => {
      const p = btn.dataset.prefix || null;
      COL.prefix = (COL.prefix === p) ? null : p;
      renderCollectiblesPrefixes();
      renderCollectiblesTable();
    });
  });
}

function renderCollectiblesSubtabs() {
  const cats = COL.data.categories || [];
  const html = cats.map(c => `
    <button class="col-subtab ${c.key === COL.category ? 'active' : ''}" data-cat="${c.key}">${escapeHtml(c.label)}</button>
  `).join('');
  const host = document.getElementById('col-subtabs');
  host.innerHTML = html;
  host.querySelectorAll('.col-subtab').forEach(btn => {
    btn.addEventListener('click', () => loadCollectibles(btn.dataset.cat));
  });
}

function renderCollectiblesTable() {
  const d = COL.data;
  const wrap = document.getElementById('col-table-wrap');
  const meta = document.getElementById('col-meta');

  // 필터 적용한 아이템 목록
  const visibleItems = COL.prefix
    ? d.items.filter(it => itemPrefix(it.name) === COL.prefix)
    : d.items;

  // owned set: "memberId:itemId"
  const ownedSet = new Set((d.owned || []).map(([m, i]) => m + ':' + i));

  // 통계 — 전체 / 화면 표시중
  const totalAll = d.members.length * d.items.length;
  const ownedAll = d.owned.length;
  const pctAll = totalAll ? ((ownedAll / totalAll) * 100).toFixed(1) : '0.0';
  let viewLine = '';
  if (COL.prefix) {
    const totalView = d.members.length * visibleItems.length;
    let ownedView = 0;
    visibleItems.forEach(it => {
      d.members.forEach(m => { if (ownedSet.has(m.id + ':' + it.id)) ownedView++; });
    });
    const pctView = totalView ? ((ownedView / totalView) * 100).toFixed(1) : '0.0';
    viewLine = ` <span><b>${escapeHtml(COL.prefix)}</b> ${ownedView} / ${totalView} (${pctView}%)</span>`;
  }
  meta.innerHTML = `
    <span><b>아이템</b> ${visibleItems.length}/${d.items.length}종</span>
    <span><b>길드원</b> ${d.members.length}명</span>
    <span><b>전체 보유율</b> ${ownedAll} / ${totalAll} (${pctAll}%)</span>${viewLine}
  `;

  if (visibleItems.length === 0) {
    wrap.innerHTML = '<div class="empty">아이템 없음</div>';
    return;
  }

  // 헤더
  let html = '<table class="col-table"><thead><tr>';
  html += '<th class="col-no">#</th>';
  html += '<th class="col-nick">닉네임</th>';
  html += '<th class="col-power">전투력</th>';
  visibleItems.forEach(it => {
    html += `<th class="col-name" title="${escapeHtml(it.name)}"><span class="vtxt">${escapeHtml(it.name)}</span></th>`;
  });
  html += '</tr></thead><tbody>';

  d.members.forEach((m, idx) => {
    const rowCls = 'row' + (IS_ADMIN ? ' admin' : '');
    html += `<tr class="${rowCls}" data-mid="${m.id}">`;
    html += `<td class="cell-no2">${idx + 1}</td>`;
    html += `<td class="cell-nick2" title="${escapeHtml(m.nickname)}">${escapeHtml(m.nickname)}</td>`;
    html += `<td class="cell-power2">${fmtPower(m.power)}</td>`;
    visibleItems.forEach(it => {
      const owned = ownedSet.has(m.id + ':' + it.id);
      const cls = 'col-chk' + (owned ? ' owned' : '') + (IS_ADMIN ? ' admin' : '');
      const symbol = owned ? '✓' : '';
      html += `<td class="cell-chk"><span class="${cls}" data-mid="${m.id}" data-iid="${it.id}" data-owned="${owned ? 1 : 0}">${symbol}</span></td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;

  if (IS_ADMIN) {
    wrap.querySelectorAll('.col-chk.admin').forEach(el => {
      el.addEventListener('click', () => toggleCollectible(el));
    });
  }
}

async function toggleCollectible(el) {
  if (el.classList.contains('saving')) return;
  const mid = parseInt(el.dataset.mid, 10);
  const iid = parseInt(el.dataset.iid, 10);
  const cur = el.dataset.owned === '1';
  const next = !cur;
  el.classList.add('saving');
  try {
    const res = await fetch('/animal/api/collectibles/toggle/', {
      method: 'POST', credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ member_id: mid, item_id: iid, owned: next }),
    });
    const j = await res.json();
    if (!res.ok) { toast(j.error || '저장 실패', 'err'); return; }
    el.dataset.owned = next ? '1' : '0';
    el.textContent = next ? '✓' : '';
    el.classList.toggle('owned', next);

    // 캐시 갱신 후 메타만 재계산 (전체 다시 그리면 깜빡임)
    if (COL.data && COL.data.owned) {
      const idx = COL.data.owned.findIndex(([a, b]) => a === mid && b === iid);
      if (next && idx === -1) COL.data.owned.push([mid, iid]);
      if (!next && idx !== -1) COL.data.owned.splice(idx, 1);
      // 메타만 살짝 업데이트
      const d = COL.data;
      const ownedSet = new Set(d.owned.map(([m2, i2]) => m2 + ':' + i2));
      const visibleItems = COL.prefix
        ? d.items.filter(it => itemPrefix(it.name) === COL.prefix)
        : d.items;
      const totalAll = d.members.length * d.items.length;
      const ownedAll = d.owned.length;
      const pctAll = totalAll ? ((ownedAll / totalAll) * 100).toFixed(1) : '0.0';
      let viewLine = '';
      if (COL.prefix) {
        const totalView = d.members.length * visibleItems.length;
        let ownedView = 0;
        visibleItems.forEach(it => {
          d.members.forEach(m2 => { if (ownedSet.has(m2.id + ':' + it.id)) ownedView++; });
        });
        const pctView = totalView ? ((ownedView / totalView) * 100).toFixed(1) : '0.0';
        viewLine = ` <span><b>${escapeHtml(COL.prefix)}</b> ${ownedView} / ${totalView} (${pctView}%)</span>`;
      }
      const m = document.getElementById('col-meta');
      if (m) {
        m.innerHTML = `
          <span><b>아이템</b> ${visibleItems.length}/${d.items.length}종</span>
          <span><b>길드원</b> ${d.members.length}명</span>
          <span><b>전체 보유율</b> ${ownedAll} / ${totalAll} (${pctAll}%)</span>${viewLine}
        `;
      }
    }
  } catch (e) {
    toast(e.message, 'err');
  } finally {
    el.classList.remove('saving');
  }
}
</script>
</body>
</html>
