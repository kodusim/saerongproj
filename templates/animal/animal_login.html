<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 로그인 — 길드 운영</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: radial-gradient(circle at 20% 0%, #1a1f3a 0%, #0a0c1c 60%);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 20px; color: #e6e8f0;
}
.box {
  width: 100%; max-width: 380px;
  background: linear-gradient(180deg, rgba(30,35,60,.8) 0%, rgba(20,24,45,.95) 100%);
  border: 1px solid rgba(120,140,200,.18);
  border-radius: 14px; overflow: hidden;
  box-shadow: 0 20px 50px rgba(0,0,0,.45);
}
.head {
  padding: 32px 28px 24px; text-align: center;
  background: linear-gradient(135deg, rgba(80,100,180,.25), rgba(160,80,200,.18));
  border-bottom: 1px solid rgba(255,255,255,.05);
}
.head .icon {
  width: 56px; height: 56px; margin: 0 auto 12px;
  background: rgba(255,255,255,.1); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem;
}
.head h1 { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
.head p { font-size: 0.78rem; color: rgba(230,232,240,.55); letter-spacing: .5px; }

.body { padding: 26px; }
.field { margin-bottom: 14px; }
.field label {
  display: block; font-size: 0.78rem; font-weight: 600;
  margin-bottom: 6px; color: rgba(230,232,240,.7);
}
.field input {
  width: 100%; padding: 11px 13px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(120,140,200,.2);
  border-radius: 8px; color: #e6e8f0; font-size: 0.95rem;
  font-family: inherit; outline: none;
  transition: border-color .15s, background .15s;
}
.field input:focus {
  border-color: #7a8fff; background: rgba(255,255,255,.09);
}
.err {
  background: rgba(220,80,80,.15); color: #ffb3b3;
  padding: 9px 12px; border-radius: 8px; font-size: 0.82rem;
  margin-bottom: 14px; border: 1px solid rgba(220,80,80,.25);
}
.btn {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg, #5b6cff 0%, #8b5cff 100%);
  color: #fff; border: none; border-radius: 8px;
  font-weight: 700; font-size: 0.98rem; cursor: pointer;
  font-family: inherit;
  transition: transform .1s, box-shadow .15s;
}
.btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(91,108,255,.35); }
.foot {
  padding: 16px 26px 22px; text-align: center;
  font-size: 0.72rem; color: rgba(230,232,240,.4);
}
.foot a { color: rgba(230,232,240,.6); text-decoration: none; }
.foot a:hover { color: #fff; }
</style>
</head>
<body>
<div class="box">
  <div class="head">
    <div class="icon">🛡️</div>
    <h1>관리자 로그인</h1>
    <p>Guild Operations Console</p>
  </div>
  <form method="post" class="body">
    {% csrf_token %}
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <div class="field">
      <label for="username">아이디</label>
      <input type="text" id="username" name="username" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="password">비밀번호</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn">로그인</button>
  </form>
  <div class="foot">
    <a href="/animal/">← 페이지로 돌아가기</a>
  </div>
</div>
</body>
</html>
